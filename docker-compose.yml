services:
  app:
    build: .
    container_name: sim-app
    ports:
      - "8080:80"
    environment:
      # OpenRouteService – travel-time estimation
      OPENROUTESERVICE_API_KEY: "YOUR_REAL_ORS_KEY_HERE"

      # Jotform – stock job form submissions
      JOTFORM_API_KEY:             ""
      JOTFORM_BASE_URL:            "https://eu-api.jotform.com"
      JOTFORM_STOCK_JOB_FORM_ID:   ""
    volumes:
      - app_data:/var/www/html/data
    restart: unless-stopped

volumes:
  app_data:
